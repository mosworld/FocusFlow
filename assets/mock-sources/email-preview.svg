<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Email container -->
  <rect width="400" height="240" fill="#FFFFFF" rx="4"/>
  <rect width="400" height="240" fill="none" stroke="#E5E7EB" stroke-width="1" rx="4"/>

  <!-- Email header -->
  <rect x="0" y="0" width="400" height="56" fill="#F9FAFB" rx="4"/>

  <!-- From avatar -->
  <circle cx="36" cy="28" r="16" fill="#8B5CF6" opacity="0.15"/>
  <text x="36" y="33" font-size="11" fill="#8B5CF6" text-anchor="middle" font-weight="600">AT</text>

  <!-- From/Subject -->
  <text x="60" y="22" font-size="10" fill="#1A1A1A" font-weight="600">ATO — Australian Taxation Office</text>
  <text x="60" y="36" font-size="9" fill="#6B7280">noreply@ato.gov.au</text>
  <text x="60" y="50" font-size="10" fill="#374151" font-weight="500">BAS Lodgement Reminder — Q1 2026</text>

  <!-- Date -->
  <text x="376" y="22" font-size="8" fill="#9CA3AF" text-anchor="end">Apr 5, 2026</text>
  <text x="376" y="34" font-size="8" fill="#9CA3AF" text-anchor="end">10:24 AM</text>

  <!-- Divider -->
  <line x1="24" y1="56" x2="376" y2="56" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Email body -->
  <text x="24" y="80" font-size="10" fill="#374151">Dear Business Owner,</text>

  <text x="24" y="102" font-size="10" fill="#374151">This is a reminder that your Business Activity Statement (BAS) for</text>
  <text x="24" y="116" font-size="10" fill="#374151">the quarter ending March 31, 2026 is due for lodgement by:</text>

  <!-- Highlight box -->
  <rect x="24" y="128" width="352" height="36" rx="6" fill="#FEF3C7"/>
  <text x="200" y="148" font-size="13" fill="#92400E" text-anchor="middle" font-weight="700">Due Date: April 15, 2026</text>
  <text x="200" y="160" font-size="9" fill="#92400E" text-anchor="middle">Late lodgement may result in penalties</text>

  <!-- More body text -->
  <rect x="24" y="176" width="300" height="8" rx="2" fill="#F3F4F6"/>
  <rect x="24" y="190" width="340" height="8" rx="2" fill="#F3F4F6"/>
  <rect x="24" y="204" width="260" height="8" rx="2" fill="#F3F4F6"/>

  <!-- CTA button -->
  <rect x="24" y="220" width="120" height="10" rx="3" fill="#8B5CF6" opacity="0.2"/>
  <text x="84" y="228" font-size="7" fill="#8B5CF6" text-anchor="middle" font-weight="600">Lodge via myGov Portal</text>
</svg>
