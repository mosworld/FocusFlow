  <text x="240" y="80" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.5">DUE DATE</text>
  <text x="240" y="96" font-size="12" fill="#DC3545" font-weight="600">April 10, 2026</text>

  <!-- Table header -->
  <rect x="24" y="120" width="352" height="24" rx="2" fill="#F9FAFB"/>
  <text x="32" y="136" font-size="8" fill="#6B7280" font-weight="600">DESCRIPTION</text>
  <text x="310" y="136" font-size="8" fill="#6B7280" font-weight="600" text-anchor="end">AMOUNT</text>

  <!-- Line items -->
  <text x="32" y="160" font-size="10" fill="#374151">Electricity usage — Q1 2026</text>
  <text x="310" y="160" font-size="10" fill="#374151" text-anchor="end">$198.40</text>

  <line x1="24" y1="170" x2="376" y2="170" stroke="#F3F4F6" stroke-width="1"/>

