<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Paper background -->
  <rect width="400" height="280" fill="#FFFFFF" rx="4"/>
  <rect width="400" height="280" fill="none" stroke="#E5E7EB" stroke-width="1" rx="4"/>

  <!-- Company logo area -->
  <rect x="24" y="20" width="60" height="24" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="54" y="36" font-size="10" fill="#3B82F6" text-anchor="middle" font-weight="600">AGL</text>

  <!-- Invoice title -->
  <text x="376" y="32" font-size="14" fill="#1A1A1A" text-anchor="end" font-weight="700">TAX INVOICE</text>
  <text x="376" y="46" font-size="9" fill="#6B7280" text-anchor="end">INV-2026-04-0892</text>

  <!-- Divider -->
  <line x1="24" y1="60" x2="376" y2="60" stroke="#E5E7EB" stroke-width="1"/>

