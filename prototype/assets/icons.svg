    <circle cx="12" cy="13" r="3"/>
  </symbol>

  <!-- Envelope / Email source -->
  <symbol id="icon-envelope" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
