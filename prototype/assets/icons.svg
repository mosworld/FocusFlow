  <!-- FocusFlow Logo -->
  <symbol id="icon-logo" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="14" fill="#6366F1" stroke="none"/>
    <path d="M10 16.5L14.5 21L22 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="16" cy="16" r="14" fill="none" stroke="#6366F1" stroke-width="1"/>
  </symbol>

  <!-- Bot Avatar -->
  <symbol id="icon-bot" viewBox="0 0 32 32">
    <rect x="2" y="6" width="28" height="22" rx="6" fill="#0088CC"/>
    <circle cx="11" cy="16" r="3" fill="white"/>
    <circle cx="21" cy="16" r="3" fill="white"/>
    <path d="M11 22 C11 24 21 24 21 22" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="16" y1="2" x2="16" y2="6" stroke="#0088CC" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="2" r="1.5" fill="#0088CC"/>
  </symbol>

