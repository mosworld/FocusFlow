<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Paper background -->
  <rect width="400" height="260" fill="#FFFFFF" rx="4"/>
  <rect width="400" height="260" fill="none" stroke="#E5E7EB" stroke-width="1" rx="4"/>

  <!-- Club logo -->
  <circle cx="48" cy="36" r="20" fill="#10B981" opacity="0.15"/>
  <text x="48" y="34" font-size="7" fill="#10B981" text-anchor="middle" font-weight="600">NORTH</text>
  <text x="48" y="43" font-size="7" fill="#10B981" text-anchor="middle" font-weight="600">FC</text>

